<svg width="1280" height="120" viewBox="0 0 1280 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0010"/>
      <stop offset="50%" style="stop-color:#0d000d"/>
      <stop offset="100%" style="stop-color:#080008"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="16" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="30%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#050005" stop-opacity="0.8"/>
    </radialGradient>
    <clipPath id="clip"><rect width="1280" height="120"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="120" fill="url(#bgGrad)"/>

  <!-- ── Top border line with pulse ── -->
  <line x1="0" y1="2" x2="1280" y2="2" stroke="#ff1a3c" stroke-width="1.2" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- ── Left grid panel ── -->
  <g opacity="0.5" clip-path="url(#clip)">
    <rect x="8" y="10" width="200" height="100" fill="none" stroke="#ff1a3c" stroke-width="0.8"/>
    <line x1="8"   y1="35"  x2="208" y2="35"  stroke="#ff1a3c" stroke-width="0.5"/>
    <line x1="8"   y1="60"  x2="208" y2="60"  stroke="#ff1a3c" stroke-width="0.5"/>
    <line x1="8"   y1="85"  x2="208" y2="85"  stroke="#ff1a3c" stroke-width="0.5"/>
    <line x1="48"  y1="10"  x2="48"  y2="110" stroke="#ff1a3c" stroke-width="0.5"/>
    <line x1="88"  y1="10"  x2="88"  y2="110" stroke="#ff1a3c" stroke-width="0.5"/>
    <line x1="128" y1="10"  x2="128" y2="110" stroke="#ff1a3c" stroke-width="0.5"/>
    <line x1="168" y1="10"  x2="168" y2="110" stroke="#ff1a3c" stroke-width="0.5"/>
    <animate attributeName="opacity" values="0.5;0.75;0.5;0.2;0.5" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- ── Right grid panel ── -->
  <g opacity="0.45" clip-path="url(#clip)">
    <rect x="1072" y="10" width="200" height="100" fill="none" stroke="#ff2d6f" stroke-width="0.8"/>
    <line x1="1072" y1="35"  x2="1272" y2="35"  stroke="#ff2d6f" stroke-width="0.5"/>
    <line x1="1072" y1="60"  x2="1272" y2="60"  stroke="#ff2d6f" stroke-width="0.5"/>
    <line x1="1072" y1="85"  x2="1272" y2="85"  stroke="#ff2d6f" stroke-width="0.5"/>
    <line x1="1112" y1="10"  x2="1112" y2="110" stroke="#ff2d6f" stroke-width="0.5"/>
    <line x1="1152" y1="10"  x2="1152" y2="110" stroke="#ff2d6f" stroke-width="0.5"/>
    <line x1="1192" y1="10"  x2="1192" y2="110" stroke="#ff2d6f" stroke-width="0.5"/>
    <line x1="1232" y1="10"  x2="1232" y2="110" stroke="#ff2d6f" stroke-width="0.5"/>
    <animate attributeName="opacity" values="0.45;0.65;0.45;0.15;0.45" dur="5s" repeatCount="indefinite"/>
  </g>

  <!-- ── Dot fields left ── -->
  <g filter="url(#glow)">
    <animate attributeName="opacity" values="0.5;0.9;0.5;0.3;0.5" dur="3.5s" repeatCount="indefinite"/>
    <rect x="220" y="18" width="2" height="2" fill="#ff1a3c"/>
    <rect x="228" y="18" width="2" height="2" fill="#ff2d6f"/>
    <rect x="236" y="18" width="2" height="2" fill="#ff1a3c"/>
    <rect x="244" y="18" width="2" height="2" fill="#ff1a3c"/>
    <rect x="220" y="26" width="2" height="2" fill="#ff2d6f"/>
    <rect x="228" y="26" width="2" height="2" fill="#ff1a3c"/>
    <rect x="236" y="26" width="2" height="2" fill="#ff2d6f"/>
    <rect x="244" y="26" width="2" height="2" fill="#ff1a3c"/>
    <rect x="220" y="34" width="2" height="2" fill="#ff1a3c"/>
    <rect x="228" y="34" width="2" height="2" fill="#ff1a3c"/>
    <rect x="236" y="34" width="2" height="2" fill="#ff1a3c"/>
    <rect x="244" y="34" width="2" height="2" fill="#ff2d6f"/>
  </g>

  <!-- ── Dot fields right ── -->
  <g filter="url(#glow)">
    <animate attributeName="opacity" values="0.4;0.8;0.4;0.2;0.4" dur="4.5s" repeatCount="indefinite"/>
    <rect x="1026" y="18" width="2" height="2" fill="#ff2d6f"/>
    <rect x="1034" y="18" width="2" height="2" fill="#ff1a3c"/>
    <rect x="1042" y="18" width="2" height="2" fill="#ff2d6f"/>
    <rect x="1050" y="18" width="2" height="2" fill="#ff1a3c"/>
    <rect x="1026" y="26" width="2" height="2" fill="#ff1a3c"/>
    <rect x="1034" y="26" width="2" height="2" fill="#ff2d6f"/>
    <rect x="1042" y="26" width="2" height="2" fill="#ff1a3c"/>
    <rect x="1050" y="26" width="2" height="2" fill="#ff2d6f"/>
    <rect x="1026" y="34" width="2" height="2" fill="#ff2d6f"/>
    <rect x="1034" y="34" width="2" height="2" fill="#ff1a3c"/>
    <rect x="1042" y="34" width="2" height="2" fill="#ff1a3c"/>
    <rect x="1050" y="34" width="2" height="2" fill="#ff2d6f"/>
  </g>

  <!-- ── Flare bursts ── -->
  <circle cx="30" cy="60" r="0" fill="#ff1a3c" opacity="0.6" filter="url(#strongGlow)">
    <animate attributeName="r" values="0;55;0" dur="5s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="opacity" values="0.6;0;0" dur="5s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="1250" cy="60" r="0" fill="#ff2d6f" opacity="0.5" filter="url(#strongGlow)">
    <animate attributeName="r" values="0;55;0" dur="6s" repeatCount="indefinite" begin="2.5s"/>
    <animate attributeName="opacity" values="0.5;0;0" dur="6s" repeatCount="indefinite" begin="2.5s"/>
  </circle>

  <!-- ── Center horizontal rule ── -->
  <line x1="280" y1="60" x2="560" y2="60" stroke="#ff1a3c" stroke-width="0.8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.9;0.5;0.2;0.5" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="720" y1="60" x2="1000" y2="60" stroke="#ff1a3c" stroke-width="0.8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.2;0.5;0.9;0.5" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Center diamonds -->
  <polygon points="580,55 590,60 580,65 570,60" fill="#ff1a3c" filter="url(#glow)" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="710,55 720,60 710,65 700,60" fill="#ff1a3c" filter="url(#glow)" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite" begin="1s"/>
  </polygon>

  <!-- Center text -->
  <text x="640" y="65" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="12" letter-spacing="5"
    fill="#ff1a3c" opacity="0.7">SYS://GRID.ACTIVE</text>

  <!-- ── Status text left ── -->
  <text x="24" y="100"
    font-family="'Courier New', monospace" font-size="10" letter-spacing="3"
    fill="#ff1a3c" opacity="0.4">
    © 2026 ROHITH KUMAR
    <animate attributeName="opacity" values="0.4;0.6;0.4;0.1;0.4" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- ── Status text right ── -->
  <text x="1256" y="100" text-anchor="end"
    font-family="'Courier New', monospace" font-size="10" letter-spacing="3"
    fill="#ff1a3c" opacity="0.4">
    github.com/rohithkumar086
    <animate attributeName="opacity" values="0.4;0.1;0.4;0.6;0.4" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- ── Scanlines ── -->
  <g opacity="0.06" clip-path="url(#clip)">
    <rect x="0" y="0"   width="1280" height="1" fill="#fff"/>
    <rect x="0" y="4"   width="1280" height="1" fill="#fff"/>
    <rect x="0" y="8"   width="1280" height="1" fill="#fff"/>
    <rect x="0" y="12"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="16"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="20"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="24"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="28"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="32"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="36"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="40"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="44"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="48"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="52"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="56"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="60"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="64"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="68"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="72"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="76"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="80"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="84"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="88"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="92"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="96"  width="1280" height="1" fill="#fff"/>
    <rect x="0" y="100" width="1280" height="1" fill="#fff"/>
    <rect x="0" y="104" width="1280" height="1" fill="#fff"/>
    <rect x="0" y="108" width="1280" height="1" fill="#fff"/>
    <rect x="0" y="112" width="1280" height="1" fill="#fff"/>
    <rect x="0" y="116" width="1280" height="1" fill="#fff"/>
  </g>

  <!-- Vignette -->
  <rect width="1280" height="120" fill="url(#vignette)"/>

  <!-- Bottom border -->
  <line x1="0" y1="118" x2="1280" y2="118" stroke="#ff1a3c" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3;0.1;0.3" dur="4s" repeatCount="indefinite"/>
  </line>
</svg>
